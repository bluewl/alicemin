<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Alice!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎂</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        
        <div id="dialog-box" class="hidden">
            <div class="portrait-container">
                <canvas id="portraitCanvas" width="120" height="120"></canvas>
            </div>
            <div class="dialog-wrap">
                <div id="dialog-name">Paul</div>
                <div id="dialog-text"></div>
                <div id="dialog-indicator" class="hidden">▼</div>
            </div>
        </div>
        
        <div id="controls-hint">
            <strong>Controls:</strong> WASD/Arrows to Move • SPACE to Interact/Next
        </div>
    </div>

    <audio id="bgMusic" autoplay loop>
        <source src="https://ia600101.us.archive.org/30/items/stardew-valley-ost/01%20Stardew%20Valley%20Overture.mp3" type="audio/mpeg">
    </audio>

    <script src="game.js"></script>
</body>
</html>
